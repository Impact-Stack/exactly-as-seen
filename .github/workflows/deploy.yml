# Deploy to Cloudflare Pages
name: Deploy

on:
  push:
    branches:
      - main # → production (impactstack.africa)
      - staging # → staging preview

  # Allow manual deploys from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: "20.x"

jobs:
  # ─────────────────────────────────────────────
  # Build
  # ─────────────────────────────────────────────
  build:
    name: Build — ${{ github.ref_name }}
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env-check.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env-check
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        if: steps.env-check.outputs.environment == 'production'
        run: npm run build
        env:
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          VITE_SITE_URL: https://impactstack.africa
          VITE_INVESTSWIPE_FIGMA_URL: ${{ secrets.VITE_INVESTSWIPE_FIGMA_URL }}

      - name: Build (staging)
        if: steps.env-check.outputs.environment == 'staging'
        run: npm run build
        env:
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID_STAGING }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID_STAGING }}
          VITE_SITE_URL: https://staging.impactstack.africa
          VITE_INVESTSWIPE_FIGMA_URL: ${{ secrets.VITE_INVESTSWIPE_FIGMA_URL }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.env-check.outputs.environment }}-${{ github.sha }}
          path: dist/
          retention-days: 5

  # ─────────────────────────────────────────────
  # Deploy to Cloudflare Pages (recommended)
  # Replace this job with Netlify/Vercel/custom if needed
  # ─────────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ needs.build.outputs.environment }}
      url: ${{ needs.build.outputs.environment == 'production' && 'https://impactstack.africa' || 'https://staging.impactstack.africa' }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.environment }}-${{ github.sha }}
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: impactstack-africa
          directory: dist
          # Production branch deploys to custom domain
          # Other branches deploy to preview URLs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

  # ─────────────────────────────────────────────
  # Post-deploy smoke test
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-cloudflare
    if: needs.build.outputs.environment == 'production'

    steps:
      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Check homepage responds
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://impactstack.africa)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Homepage OK (HTTP $STATUS)"

      - name: Check key routes
        run: |
          ROUTES=("/about" "/portfolio" "/contact" "/pricing" "/industries")
          for route in "${ROUTES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://impactstack.africa$route")
            echo "Route $route → HTTP $STATUS"
          done

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production smoke test failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Smoke test failed after deploy of commit \`${context.sha}\`.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'priority: critical', 'type: deployment']
            });
