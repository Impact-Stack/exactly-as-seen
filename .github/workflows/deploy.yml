name: CD - Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'
          
      - name: Install dependencies
        run: bun install
          
      - name: Build project
        run: bun run build
        env:
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          VITE_SITE_URL: https://impactstack.africa
          VITE_INVESTSWIPE_FIGMA_URL: ${{ secrets.VITE_INVESTSWIPE_FIGMA_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --confirm'
          
      - name: Show deployment info
        run: |
          echo "✅ DEPLOYMENT COMPLETE"
          echo "🌐 Frontend: https://impactstack.africa"