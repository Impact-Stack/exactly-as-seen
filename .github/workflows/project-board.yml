#Auto-manage GitHub Project board
name: Project Board Automation

on:
  issues:
    types: [opened, labeled, closed, reopened, assigned]
  pull_request:
    types: [opened, ready_for_review, closed, labeled]

jobs:
  # ─────────────────────────────────────────────
  # Auto-add issues/PRs to the project board
  # Requires a GitHub Project (V2) and PAT with project scope
  # Set PROJECT_ID in repo secrets (get it from the project URL)
  # ─────────────────────────────────────────────
  add-to-project:
    name: Add to Project Board
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'pull_request' && github.event.action == 'opened')

    steps:
      - name: Add issue/PR to project
        uses: actions/add-to-project@v1.0.2
        with:
          # Your GitHub Projects V2 URL
          # e.g. https://github.com/orgs/impactstack-africa/projects/1
          # or   https://github.com/users/Liso2004/projects/1
          project-url: https://github.com/users/${{ github.repository_owner }}/projects/1
          github-token: ${{ secrets.PROJECT_PAT }}

  # ─────────────────────────────────────────────
  # Auto-label by content
  # ─────────────────────────────────────────────
  auto-label:
    name: Auto-label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  # ─────────────────────────────────────────────
  # Move card to "In Progress" when PR is opened
  # ─────────────────────────────────────────────
  pr-to-in-progress:
    name: Move linked issue to In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'

    steps:
      - name: Extract linked issue number
        id: linked
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (match) {
              core.setOutput('issue_number', match[1]);
              console.log(`Linked issue: #${match[1]}`);
            } else {
              console.log('No linked issue found in PR body');
            }

      - name: Comment on linked issue
        if: steps.linked.outputs.issue_number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.linked.outputs.issue_number }}'),
              body: `🔗 PR #${context.payload.pull_request.number} has been opened to address this issue.\n\n**Branch:** \`${context.payload.pull_request.head.ref}\`\n**Opened by:** @${context.payload.pull_request.user.login}`
            });

  # ─────────────────────────────────────────────
  # Auto-close linked issues when PR merges
  # ─────────────────────────────────────────────
  close-on-merge:
    name: Close linked issue on merge
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `✅ This PR has been merged into \`${context.payload.pull_request.base.ref}\` by @${context.payload.pull_request.merged_by.login}.`
            });

  # ─────────────────────────────────────────────
  # Welcome new contributors
  # ─────────────────────────────────────────────
  welcome:
    name: Welcome new issue opener
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - name: Check if first contribution
        id: first-time
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.issue.user.login,
              state: 'all'
            });
            core.setOutput('is_first', issues.length === 1 ? 'true' : 'false');

      - name: Post welcome comment
        if: steps.first-time.outputs.is_first == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `👋 Thanks for opening your first issue on the ImpactStack Africa repo!\n\nOur team will review this and respond within **1–2 business days** (Mon–Fri, 8AM–5PM SAST).\n\nFor urgent matters, reach us at hello@impactstack.africa or WhatsApp: +27 83 894 7546.`
            });
