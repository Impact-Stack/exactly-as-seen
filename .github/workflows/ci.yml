# Lint, test, build on every push/PR
name: CI Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint
  # ─────────────────────────────────────────────
  lint:
    name: ESLint + TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # JOB 2 — Test
  # ─────────────────────────────────────────────
  test:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 3 — Build
  # ─────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_INVESTSWIPE_FIGMA_URL: ${{ secrets.VITE_INVESTSWIPE_FIGMA_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: Check bundle size
        run: |
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Bundle size: $DIST_SIZE"
          # Fail if bundle exceeds 50MB
          DIST_BYTES=$(du -sb dist/ | cut -f1)
          if [ "$DIST_BYTES" -gt 52428800 ]; then
            echo "❌ Bundle size exceeds 50MB limit"
            exit 1
          fi
          echo "✅ Bundle size within limits"

  # ─────────────────────────────────────────────
  # JOB 4 — Accessibility (Lighthouse CI)
  # ─────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Accessibility Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ".lighthouserc.json"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 5 — Security audit
  # ─────────────────────────────────────────────
  security:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Create audit report
        if: failure()
        run: |
          npm audit --json > audit-report.json || true
          echo "🔐 Audit report generated"

      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30
