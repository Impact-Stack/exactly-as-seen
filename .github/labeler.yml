#Auto-label PRs by file changed
# .github/labeler.yml
# Automatically labels PRs based on files changed
# Used by the project-board.yml workflow (actions/labeler@v5)

"type: ui":
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**"
          - "src/pages/**"
          - "src/index.css"
          - "tailwind.config.ts"

"type: refactor":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lib/**"
          - "src/hooks/**"

"type: deployment":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - "vite.config.ts"
          - "tsconfig*.json"
          - ".lighthouserc.json"

"type: dependency":
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"

"type: seo":
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/SEO.tsx"
          - "src/lib/schema-*.ts"
          - "public/sitemap.xml"
          - "public/robots.txt"

"type: documentation":
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

"type: content":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lib/projects.ts"
          - "src/lib/pricing.ts"
          - "src/lib/industries.ts"

"area: investswipe":
  - changed-files:
      - any-glob-to-any-file:
          - "src/pages/InvestSwipe.tsx"
          - "src/components/home/InvestSwipeSection.tsx"

"area: contact":
  - changed-files:
      - any-glob-to-any-file:
          - "src/pages/Contact.tsx"

"area: homepage":
  - changed-files:
      - any-glob-to-any-file:
          - "src/pages/Index.tsx"
          - "src/components/home/**"

"area: portfolio":
  - changed-files:
      - any-glob-to-any-file:
          - "src/pages/Portfolio.tsx"

"area: navigation":
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/Header.tsx"
          - "src/components/Footer.tsx"
          - "src/components/PageShell.tsx"
