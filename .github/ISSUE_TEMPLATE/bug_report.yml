#Bug report form
name: 🐛 Bug Report
description: Report a bug on impactstack.africa
title: "[Bug]: "
labels: ["type: bug", "status: needs-triage"]
assignees: ["Liso2004"]

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!
        Please fill in as much detail as possible to help us reproduce and fix the issue quickly.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this affect users?
      options:
        - "🔴 Critical — Site down, data loss, or security issue"
        - "🟠 High — Core feature broken, no workaround"
        - "🟡 Medium — Feature degraded, workaround exists"
        - "🟢 Low — Minor visual or UX issue"
    validations:
      required: true

  - type: dropdown
    id: page
    attributes:
      label: Affected Page / Route
      description: Which page is affected?
      options:
        - "/ (Home)"
        - "/about"
        - "/portfolio"
        - "/contact"
        - "/pricing"
        - "/industries"
        - "/investswipe"
        - "/insights"
        - "/services/web"
        - "/services/mobile"
        - "/services/security"
        - "/services/government"
        - "/legal/*"
        - "Multiple pages"
        - "Global (header/footer)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what the bug is.
      placeholder: "When I click the 'Book a Consultation' button on the homepage, the form does not open..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to https://impactstack.africa
        2. Click on '...'
        3. Scroll to '...'
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: If applicable, attach screenshots or a screen recording.
      placeholder: "Drag and drop images here or paste a URL."

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile Chrome (Android)
        - Mobile Safari (iOS)
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      options:
        - Desktop
        - Laptop
        - Tablet
        - Mobile
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, macOS Ventura, Android 14, iOS 17"

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Open browser DevTools (F12) → Console tab. Paste any red errors here.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help us debug this faster?
