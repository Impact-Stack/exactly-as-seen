#Feature request form
name: ✨ Feature Request
description: Suggest a new feature or improvement for impactstack.africa
title: "[Feature]: "
labels: ["type: feature", "status: needs-triage"]
assignees: ["Liso2004"]

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Use this template for new features, UX improvements, or content additions.

  - type: dropdown
    id: area
    attributes:
      label: Area of Improvement
      options:
        - "Homepage / Hero section"
        - "Portfolio / Case studies"
        - "Contact form"
        - "Pricing page"
        - "InvestSwipe page"
        - "Navigation / Header"
        - "Footer"
        - "SEO / Metadata"
        - "Performance / Core Web Vitals"
        - "Accessibility"
        - "Analytics / Tracking"
        - "New page / route"
        - "Mobile experience"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What user need does it address?
      placeholder: "Currently, visitors can't filter portfolio projects by technology stack, which makes it harder to find relevant case studies..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
      placeholder: "Add technology filter chips above the portfolio grid, similar to the existing project type filters..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered?

  - type: dropdown
    id: priority
    attributes:
      label: Suggested Priority
      options:
        - "🔴 High — Significant business / conversion impact"
        - "🟡 Medium — Nice to have, improves UX"
        - "🟢 Low — Minor enhancement"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, references, examples from other sites, or any other context.
