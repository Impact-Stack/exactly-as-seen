#Security vulnerability form
name: 🔐 Security Vulnerability
description: Report a security vulnerability (for non-critical issues — critical issues should be emailed to hello@impactstack.africa)
title: "[Security]: "
labels: ["type: security", "priority: critical", "status: needs-triage"]
assignees: ["Liso2004"]

body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ Security Vulnerability Report

        > **For critical vulnerabilities** (data exposure, auth bypass, XSS, etc.) please email **hello@impactstack.africa** directly rather than creating a public issue.

        This template is for lower-severity security concerns.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Low — No direct user impact"
        - "Medium — Limited impact with specific conditions"
        - "High — Significant user or data risk"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Vulnerability Category
      options:
        - "Exposed sensitive information"
        - "Missing Content Security Policy header"
        - "Outdated dependency with known CVE"
        - "Insecure form handling"
        - "Mixed content (HTTP/HTTPS)"
        - "Missing HTTPS redirect"
        - "Overly permissive CORS"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Vulnerability Description
      description: Describe the vulnerability. Do NOT include working exploit code.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Potential Impact
      description: What could an attacker achieve by exploiting this?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we verify this vulnerability?
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested Mitigation
      description: If you have a suggestion for how to fix this, please share it here.
